<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        // Check theme preference before rendering to prevent flashing (default to light)
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Protected Link - FlexURL</title>
    <link rel="icon" type="image/svg+xml" href="/static/small_logo.svg">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'sans-serif'],
                    },
                    textColor: {
                        slate: {
                            400: 'var(--text-slate-400)',
                            500: 'var(--text-slate-500)',
                            600: 'var(--text-slate-600)',
                            700: 'var(--text-slate-700)',
                            800: 'var(--text-slate-800)',
                            900: 'var(--text-slate-900)',
                        }
                    },
                    backgroundColor: {
                        white: 'var(--bg-white)',
                        slate: {
                            50: 'var(--bg-slate-50)',
                            100: 'var(--bg-slate-100)',
                        }
                    },
                    borderColor: {
                        slate: {
                            100: 'var(--border-slate-100)',
                            200: 'var(--border-slate-200)',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --text-slate-400: #475569;
            --text-slate-500: #334155;
            --text-slate-600: #475569;
            --text-slate-700: #334155;
            --text-slate-800: #1e293b;
            --text-slate-900: #0f172a;
            --bg-white: #ffffff;
            --bg-slate-50: #f8fafc;
            --bg-slate-100: #f1f5f9;
            --border-slate-100: #f1f5f9;
            --border-slate-200: #e2e8f0;
        }
        .dark {
            --text-slate-400: #94a3b8;
            --text-slate-500: #cbd5e1;
            --text-slate-600: #cbd5e1;
            --text-slate-700: #e2e8f0;
            --text-slate-800: #f1f5f9;
            --text-slate-900: #f8fafc;
            --bg-white: #0f172a;
            --bg-slate-50: #020617;
            --bg-slate-100: #1e293b;
            --border-slate-100: #334155;
            --border-slate-200: #1e293b;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 min-h-screen flex flex-col font-sans">
    
    <!-- Top Navigation Header -->
    <header class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 sticky top-0 z-50">
        <div class="max-w-[1244px] mx-auto px-4 sm:px-6 lg:px-8 h-18 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="flex-shrink-0 w-48 flex items-center">
                    <a href="/" class="flex items-center">
                        <img src="/static/logo.svg" alt="FlexURL Logo" class="h-12 w-auto py-1.5 px-2 dark:brightness-0 dark:invert">
                    </a>
                </div>
            </div>
            <div class="flex items-center space-x-6">
                <!-- Theme Toggle Button -->
                <button id="theme-toggle" type="button" class="text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 focus:outline-none focus:ring-4 focus:ring-slate-200 dark:focus:ring-slate-700 rounded-lg text-sm p-2.5 transition-colors">
                    <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                    <svg id="theme-toggle-light-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95a1 1 0 11-1.414-1.414 1.05 1.05 0 000-1.414 1 1 0 111.414 1.414 1.05 1.05 0 000 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.46 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" fill-rule="evenodd" clip-rule="evenodd"></path></svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center px-4 py-12">
        <div class="bg-white border border-slate-200 border-t-4 border-t-indigo-600 rounded-xl max-w-md w-full p-8 text-center shadow-sm dark:bg-slate-900 dark:border-slate-800">
            <div class="mb-4 text-indigo-600 flex justify-center">
                <svg class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h1 class="text-lg font-bold tracking-tight text-slate-900 dark:text-white mb-2">
                Password Required
            </h1>
            <p class="text-xs text-slate-500 dark:text-slate-400 leading-relaxed mb-6">
                This link is password-protected. Please enter the correct password to be redirected to the target destination.
            </p>
            
            <form method="POST" class="space-y-4">
                <div>
                    <input type="password" name="password" id="password" required
                        placeholder="Enter link password"
                        class="w-full px-3 py-2 border border-slate-200 dark:border-slate-700 dark:bg-slate-800 rounded-lg text-sm text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                
                <!-- Placeholder for dynamic server-side validation error injection -->
                <div id="error-message" class="text-xs text-rose-500 font-medium hidden">
                    Incorrect password. Please try again.
                </div>
                
                <button type="submit" 
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-6 rounded-lg text-sm transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
                    Access Link
                </button>
            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-slate-200 py-8 px-4 text-center mt-12 dark:bg-slate-900 dark:border-slate-800">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="text-xs text-slate-400">
                &copy; 2026 FlexURL. All rights reserved. | <a href="mailto:connect@flexurl.app" class="underline hover:text-indigo-600 transition-colors">connect@flexurl.app</a>
            </div>
        </div>
    </footer>
    
    <script>
        // Inject error message if query string contains error=1
        if (window.location.search.includes('error=1')) {
            document.getElementById('error-message').classList.remove('hidden');
        }

        // Theme Toggle Functionality
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
        const themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');

        if (document.documentElement.classList.contains('dark')) {
            themeToggleLightIcon.classList.remove('hidden');
        } else {
            themeToggleDarkIcon.classList.remove('hidden');
        }

        themeToggleBtn.addEventListener('click', function() {
            themeToggleDarkIcon.classList.toggle('hidden');
            themeToggleLightIcon.classList.toggle('hidden');
            
            if (localStorage.getItem('theme')) {
                if (localStorage.getItem('theme') === 'light') {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                }
            } else {
                if (document.documentElement.classList.contains('dark')) {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                } else {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                }
            }
        });
    </script>
</body>
</html>
