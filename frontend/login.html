<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        // Check theme preference before rendering to prevent flashing (default to light)
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <meta charset="UTF-8">

            --text-slate-500: #334155;
            --text-slate-600: #475569;
            --text-slate-700: #334155;

            --bg-white: #ffffff;

</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 min-h-screen flex flex-col font-sans antialiased">
    
    <!-- Top Navigation Header -->
    <header class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 sticky top-0 z-50">
        <div class="max-w-[1380px] mx-auto px-4 sm:px-6 lg:px-8 h-18 flex items-center justify-between">
            <div class="flex items-center space-x-8">
                <div class="flex-shrink-0 w-48 flex items-center">
                    <a href="/" class="flex items-center">
                        <img src="/static/logo.svg" alt="FlexURL Logo" class="h-12 w-auto py-1.5 px-2 dark:brightness-0 dark:invert">
                    </a>
                </div>
                <nav class="hidden md:flex items-center space-x-6">
                    <a href="/#features" class="text-sm font-medium text-slate-600 dark:text-slate-300 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors">Features</a>
                    <a href="/#security-hub" class="text-sm font-medium text-slate-600 dark:text-slate-300 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors">Security</a>
                    <a href="/#pricing" class="text-sm font-medium text-slate-600 dark:text-slate-300 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors">Pricing</a>
                </nav>
            </div>
            <div class="flex items-center space-x-4">
                <!-- Theme Toggle Button -->
                <button id="theme-toggle" type="button" class="text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 focus:outline-none focus:ring-4 focus:ring-slate-200 dark:focus:ring-slate-700 rounded-lg text-sm p-2.5 transition-colors">
                    <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                    <svg id="theme-toggle-light-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95a1 1 0 11-1.414-1.414 1.05 1.05 0 000-1.414 1 1 0 111.414 1.414 1.05 1.05 0 000 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.46 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" fill-rule="evenodd" clip-rule="evenodd"></path></svg>
                </button>
                <!-- Log in and Sign up are served on this page -->
            </div>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center px-4 py-16">
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl max-w-md w-full p-8 shadow-sm">
            <div class="text-center mb-8">
                <h1 id="form-title" class="text-2xl font-extrabold tracking-tight text-slate-900">
                    Welcome to FlexURL
                </h1>
                <p class="text-xs text-slate-500 mt-2">
                    Sign in or register your account to manage branded short links.
                </p>
            </div>
            
            <!-- Error message container -->
            <div id="login-error" class="hidden p-3 bg-red-50 border border-red-200 text-red-600 text-xs rounded-lg mb-4"></div>

            <form id="login-form" class="space-y-4">
                <div id="username-container" class="hidden">
                    <label for="username" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Username</label>
                    <input type="text" id="username" placeholder="username"
                        class="w-full px-4 py-2.5 border border-slate-200 dark:border-slate-700 rounded-lg text-sm text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors bg-white dark:bg-slate-800">
                </div>
                <div>
                    <label for="email" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Email Address</label>
                    <input type="email" id="email" required placeholder="name@company.com"
                        class="w-full px-4 py-2.5 border border-slate-200 dark:border-slate-700 rounded-lg text-sm text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors bg-white dark:bg-slate-800">
                </div>
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label for="password" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider">Password</label>
                        <a href="#forgot" id="forgot-password-link" class="text-xs font-medium text-indigo-600 hover:text-indigo-800 transition-colors" onclick="event.preventDefault(); alert('Please reset password via Google or register a new email/password account.');">Forgot password?</a>
                    </div>
                    <div class="relative">
                        <input type="password" id="password" required placeholder="••••••••"
                            class="w-full pr-12 pl-4 py-2.5 border border-slate-200 dark:border-slate-700 rounded-lg text-sm text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors bg-white dark:bg-slate-800">
                        <button type="button" id="toggle-password-btn" class="absolute right-3 top-2.5 text-slate-400 hover:text-slate-600 transition-colors p-1" title="Toggle password visibility">
                            <svg id="eye-icon-show" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                            <svg id="eye-icon-hide" class="h-5 w-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="submit" id="submit-btn"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 rounded-lg text-sm transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
                    Sign In
                </button>
            </form>
            
            <!-- Separator -->
            <div class="relative my-6">
                <div class="absolute inset-0 flex items-center" aria-hidden="true">
                    <div class="w-full border-t border-slate-200"></div>
                </div>
                <div class="relative flex justify-center text-xs uppercase">
                    <span class="bg-white dark:bg-slate-900 px-2 text-slate-400 font-medium">Or continue with</span>
                </div>
            </div>

            <!-- OAuth Options -->
            <div class="space-y-2">
                <button type="button" id="google-signin-btn"
                    class="flex items-center justify-center w-full bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 border border-slate-200 dark:border-slate-700 font-medium py-2.5 px-4 rounded-lg text-sm transition-colors focus:outline-none focus:ring-2 focus:ring-slate-500">
                    <svg class="h-5 w-5 mr-3" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
                    </svg>
                    <span>Sign in with Google</span>
                </button>
            </div>
            
            <p class="text-xs text-center text-slate-500 mt-6">
                Don't have an account? <a href="#" id="toggle-mode-link" class="text-indigo-600 hover:text-indigo-800 font-semibold transition-colors font-medium">Sign up for free</a>
            </p>
        </div>
    </main>

    <footer class="bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 py-8 px-4 mt-auto">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="text-xs text-slate-400">
                &copy; 2026 FlexURL. All rights reserved. | <a href="/privacy" class="underline hover:text-indigo-600 transition-colors">Privacy Policy</a> | <a href="/terms" class="underline hover:text-indigo-600 transition-colors">Terms of Service</a> | <a href="mailto:connect@flexurl.app" class="underline hover:text-indigo-600 transition-colors">connect@flexurl.app</a>
            </div>
            <div class="flex space-x-6">
                <a href="/documentation" class="text-xs text-slate-400 hover:text-indigo-600 transition-colors">Documentation</a>
            </div>
        </div>
    </footer>

    <script type="module">
        // Import Firebase Client SDKs
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { 
            getAuth, 
            signInWithPopup, 
            GoogleAuthProvider, 
            signInWithEmailAndPassword,
            createUserWithEmailAndPassword,
            updateProfile
        } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAwd02aH3fhyQi_-ygNzHvUVxWQXKg9Cu0",
            authDomain: "flexurlapp.firebaseapp.com",
            projectId: "flexurlapp",
            storageBucket: "flexurlapp.firebasestorage.app",
            messagingSenderId: "808930274632",
            appId: "1:808930274632:web:26be4ec4f63a7c42d8d77d",
            measurementId: "G-2M11H7HE38"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        function getRedirectUrl() {
            const params = new URLSearchParams(window.location.search);
            const plan = params.get('plan') || 'startup';
            return params.get('upgrade') === '1' ? `/dashboard?upgrade=1&plan=${plan}` : '/dashboard';
        }

        // Redirect to homepage if user is already logged in on the backend
        async function checkAuthAndRedirect() {
            try {
                const response = await fetch('/auth/me');
                if (response.ok) {
                    const data = await response.json();
                    if (data.logged_in) {
                        window.location.href = getRedirectUrl();
                    }
                }
            } catch (err) {
                console.error("Auth check failed:", err);
            }
        }
        checkAuthAndRedirect();

        // Helper to send ID token to backend session creator
        async function authenticateWithBackend(idToken) {
            try {
                const response = await fetch('/auth/session', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ idToken })
                });
                
                if (response.ok) {
                    window.location.href = getRedirectUrl();
                } else {
                    const err = await response.json();
                    showError(err.detail || 'Authentication failed on backend');
                }
            } catch (err) {
                showError('Error connecting to authentication server');
            }
        }

        function getCleanErrorMessage(err) {
            if (!err.code) {
                let msg = err.message || 'Authentication failed';
                msg = msg.replace(/^Firebase:\s*/i, '');
                msg = msg.replace(/Error\s*\((.*?)\)/i, '$1');
                return msg;
            }
            
            switch (err.code) {
                case 'auth/operation-not-allowed':
                    return 'Email and password sign-in/registration is currently disabled. Please enable it in the Firebase Console under Authentication > Sign-in method.';
                case 'auth/user-not-found':
                case 'auth/wrong-password':
                case 'auth/invalid-credential':
                    return 'Invalid email address or password.';
                case 'auth/email-already-in-use':
                    return 'This email address is already registered. Please sign in instead.';
                case 'auth/weak-password':
                    return 'Password should be at least 6 characters long.';
                case 'auth/popup-closed-by-user':
                    return 'The sign-in popup was closed before completing authentication.';
                default:
                    let msg = err.message || '';
                    msg = msg.replace(/^Firebase:\s*/i, '');
                    msg = msg.replace(/Error\s*\((.*?)\)/i, '$1');
                    return msg || 'Authentication failed';
            }
        }

        function showError(message) {
            const errEl = document.getElementById('login-error');
            errEl.textContent = message;
            errEl.classList.remove('hidden');
        }

        function clearError() {
            const errEl = document.getElementById('login-error');
            errEl.textContent = '';
            errEl.classList.add('hidden');
        }

        // Google Login click handler
        const googleBtn = document.getElementById('google-signin-btn');
        googleBtn.addEventListener('click', async (e) => {
            e.preventDefault();
            clearError();
            const provider = new GoogleAuthProvider();
            try {
                const result = await signInWithPopup(auth, provider);
                const idToken = await result.user.getIdToken();
                await authenticateWithBackend(idToken);
            } catch (err) {
                console.error("Google sign in failed:", err);
                showError(getCleanErrorMessage(err));
            }
        });

        // Toggle sign-up vs sign-in
        let isSignUpMode = false;
        const toggleLink = document.getElementById('toggle-mode-link');
        const formTitle = document.getElementById('form-title');
        const submitBtn = document.getElementById('submit-btn');
        const forgotPasswordLink = document.getElementById('forgot-password-link');
        const usernameContainer = document.getElementById('username-container');
        const usernameInput = document.getElementById('username');

        function setAuthMode(signUpMode) {
            isSignUpMode = signUpMode;
            clearError();
            if (isSignUpMode) {
                formTitle.textContent = "Create an Account";
                submitBtn.textContent = "Register";
                if (toggleLink) toggleLink.textContent = "Sign in with existing account";
                if (forgotPasswordLink) forgotPasswordLink.classList.add('hidden');
                if (usernameContainer) usernameContainer.classList.remove('hidden');
                if (usernameInput) usernameInput.required = true;
            } else {
                formTitle.textContent = "Welcome to FlexURL";
                submitBtn.textContent = "Sign In";
                if (toggleLink) toggleLink.textContent = "Sign up for free";
                if (forgotPasswordLink) forgotPasswordLink.classList.remove('hidden');
                if (usernameContainer) usernameContainer.classList.add('hidden');
                if (usernameInput) {
                    usernameInput.required = false;
                    usernameInput.value = '';
                }
            }
        }

        if (toggleLink) {
            toggleLink.addEventListener('click', (e) => {
                e.preventDefault();
                setAuthMode(!isSignUpMode);
            });
        }

        // Check if page loaded with mode=signup in query string
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('mode') === 'signup') {
            setAuthMode(true);
        }

        // Toggle password visibility script
        const passwordInput = document.getElementById('password');
        const togglePasswordBtn = document.getElementById('toggle-password-btn');
        const eyeIconShow = document.getElementById('eye-icon-show');
        const eyeIconHide = document.getElementById('eye-icon-hide');

        if (togglePasswordBtn && passwordInput) {
            togglePasswordBtn.addEventListener('click', () => {
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    eyeIconShow.classList.add('hidden');
                    eyeIconHide.classList.remove('hidden');
                } else {
                    passwordInput.type = 'password';
                    eyeIconShow.classList.remove('hidden');
                    eyeIconHide.classList.add('hidden');
                }
            });
        }

        // Email Form Submission
        const form = document.getElementById('login-form');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearError();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            try {
                let userCredential;
                if (isSignUpMode) {
                    const username = usernameInput ? usernameInput.value.trim() : '';
                    if (!username) {
                        showError('Username is required.');
                        return;
                    }

                    // Pre-check username availability in local database
                    const checkResp = await fetch(`/auth/check-username?username=${encodeURIComponent(username)}`);
                    if (!checkResp.ok) {
                        showError('Failed to check username availability.');
                        return;
                    }
                    const checkData = await checkResp.json();
                    if (!checkData.available) {
                        showError('This username is already taken. Please choose another one.');
                        return;
                    }

                    // Create the user in Firebase Auth
                    userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    
                    // Set display name on Firebase user profile
                    await updateProfile(userCredential.user, { displayName: username });
                    
                    // Reload user profile and force-refresh the ID Token to embed the new displayName
                    await userCredential.user.reload();
                    const idToken = await auth.currentUser.getIdToken(true);
                    await authenticateWithBackend(idToken);
                } else {
                    userCredential = await signInWithEmailAndPassword(auth, email, password);
                    const idToken = await userCredential.user.getIdToken();
                    await authenticateWithBackend(idToken);
                }
            } catch (err) {
                console.error("Authentication failed:", err);
                showError(getCleanErrorMessage(err));
            }
        });

        // Theme Toggle Functionality
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
        const themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');

        if (document.documentElement.classList.contains('dark')) {
            themeToggleLightIcon.classList.remove('hidden');
        } else {
            themeToggleDarkIcon.classList.remove('hidden');
        }

        themeToggleBtn.addEventListener('click', function() {
            themeToggleDarkIcon.classList.toggle('hidden');
            themeToggleLightIcon.classList.toggle('hidden');
            
            if (localStorage.getItem('theme')) {
                if (localStorage.getItem('theme') === 'light') {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                }
            } else {
                if (document.documentElement.classList.contains('dark')) {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                } else {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                }
            }
            window.dispatchEvent(new Event('theme-changed'));
        });
    </script>
</body>
</html>
