  <line x1="127" y1="127" x2="156" y2="156" stroke="url(#grad)" stroke-width="8" stroke-linecap="round"/>

  <!-- Analytics bars -->
  <rect x="88" y="104" width="8" height="18" rx="2" fill="url(#grad)"/>
  <rect x="101" y="92" width="8" height="30" rx="2" fill="url(#grad)"/>
  <rect x="114" y="78" width="8" height="44" rx="2" fill="url(#grad)"/>

  <!-- Growth arrow -->
  <path d="M128 58 L165 28" stroke="url(#grad)" stroke-width="7" fill="none" stroke-linecap="round"/>
