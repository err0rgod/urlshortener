<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            background-color: #f4f7f6;
        }
        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h1 { margin-bottom: 1.5rem; color: #333; }
        input[type="text"] {
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 1rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 0.8rem;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: #0056b3; }
        #error { color: #dc3545; margin-top: 1rem; display: none; }
        #result { margin-top: 1.5rem; display: none; }
        .result-group {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .result-group input { margin-bottom: 0; flex-grow: 1; }
        .copy-btn { width: auto; background-color: #28a745; }
        .copy-btn:hover { background-color: #218838; }
        
        footer {
            background: white;
            padding: 1.5rem;
            text-align: center;
            border-top: 1px solid #ddd;
        }
        .social-links {
            margin-top: 1rem;
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        .social-links a {
            color: #555;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .social-links a:hover { color: #007bff; }
        .footer-bottom {
            margin-top: 1rem;
            font-size: 0.8rem;
            color: #888;
        }
        .footer-bottom a { color: #888; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="main-content">
        <div class="container">
            <h1>URL Shortener</h1>
            <form id="shorten-form">
                <input type="text" id="long_url" placeholder="Paste your long URL here (include http://)" required>
                <button type="submit">Shorten</button>
            </form>
            <p id="error"></p>
            <div id="result">
                <p>Your shortened URL:</p>
                <div class="result-group">
                    <input type="text" id="short_url" readonly>
                    <button class="copy-btn" id="copy-btn">Copy</button>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div class="social-links">
            <a href="https://github.com/err0rgod" target="_blank">GitHub</a>
            <a href="https://linkedin.com/in/nirbhay-katiyar" target="_blank">LinkedIn</a>
            <a href="https://x.com/err0rgod" target="_blank">X (Twitter)</a>
            <a href="https://pypi.org/user/err0rgod" target="_blank">PyPI</a>
            <a href="https://err0rgod.medium.com" target="_blank">Medium</a>
        </div>
        <div class="footer-bottom">
            &copy; 2026 err0rgod. All rights reserved. | <a href="/privacy">Privacy Policy</a>
        </div>
    </footer>

    <script>
        const form = document.getElementById('shorten-form');
        const errorEl = document.getElementById('error');
        const resultEl = document.getElementById('result');
        const shortUrlInput = document.getElementById('short_url');
        const copyBtn = document.getElementById('copy-btn');

        form.onsubmit = async (e) => {
            e.preventDefault();
            errorEl.style.display = 'none';
            resultEl.style.display = 'none';

            const long_url = document.getElementById('long_url').value;

            try {
                const response = await fetch('/shorten', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ long_url })
                });

                const data = await response.json();

                if (response.ok) {
                    shortUrlInput.value = data.short_url;
                    resultEl.style.display = 'block';
                } else {
                    errorEl.textContent = data.detail || 'Something went wrong';
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                errorEl.textContent = 'Error connecting to server';
                errorEl.style.display = 'block';
            }
        };

        copyBtn.onclick = () => {
            shortUrlInput.select();
            navigator.clipboard.writeText(shortUrlInput.value);
            const originalText = copyBtn.textContent;
            copyBtn.textContent = 'Copied!';
            setTimeout(() => copyBtn.textContent = originalText, 2000);
        };
    </script>
</body>
</html>
