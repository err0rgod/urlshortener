<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unsafe Link Blocked</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #fff5f5;
        }
        .container {
            background: white;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(220, 53, 69, 0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
            border-top: 5px solid #dc3545;
        }
        .icon {
            font-size: 4rem;
            color: #dc3545;
            margin-bottom: 1rem;
        }
        h1 { margin-bottom: 1rem; color: #333; }
        p { color: #666; line-height: 1.6; margin-bottom: 2rem; }
        .btn {
            display: inline-block;
            padding: 0.8rem 1.5rem;
            background-color: #6c757d;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            transition: background 0.2s;
        }
        .btn:hover { background-color: #5a6268; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">⚠️</div>
        <h1>Security Warning</h1>
        <p>This link has been blocked because it was flagged as malicious or suspicious by our security systems. It may contain malware, phishing attempts, or other harmful content.</p>
        <a href="/" class="btn">Back to Safety</a>
    </div>
</body>
</html>
